name: Build & Publish GitHub Release

on:
  push:
    tags:
      - v*
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build and upload assets for
        required: true
        type: string

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag || github.ref_name }}

jobs:
  build:
    name: Build & Publish GitHub Release
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      with:
        ref: ${{ github.event.release.tag_name || inputs.tag || github.ref }}

    - name: Checkout submodules
      run: |
        git submodule sync
        git submodule update --init --recursive --force

    - name: Build Docker Image
      run: |
        docker build -t libass/jso .

    - name: Build Binaries
      run: |
        docker run --rm --env LC_ALL=C.UTF-8 -v "${PWD}":/code libass/jso:latest

    - name: Setup Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
      with:
        node-version: 24
        check-latest: true

    - name: Build Embedded Assets
      run: node scripts/build-assets.js

    - name: Pack Release Assets
      run: |
        mkdir -p release-artifacts
        npm pack --ignore-scripts --pack-destination release-artifacts
        tar -czf "release-artifacts/libass-wasm-${RELEASE_TAG}-dist-js.tar.gz" -C dist js

    - name: Publish GitHub Release
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        if gh release view "${RELEASE_TAG}" > /dev/null 2>&1; then
          gh release upload "${RELEASE_TAG}" release-artifacts/* --clobber
        else
          gh release create "${RELEASE_TAG}" release-artifacts/* \
            --title "${RELEASE_TAG}" \
            --generate-notes
        fi
